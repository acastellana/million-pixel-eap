<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Million Pixel Page — Powered by EIP-8183 & GenLayer</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --grid-color: #1a1a1e;
            --text-color: #e0e0e0;
            --accent-color: #00ffcc;
            --hover-color: rgba(0, 255, 204, 0.2);
        }

        * { box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        @media (max-width: 600px) {
            html, body {
                overflow-y: auto;
                height: auto;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
        }

        /* ── Header — floating overlay top-left ────────────────────────────── */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1rem;
            background: rgba(10, 10, 12, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 200;
            pointer-events: none; /* let clicks pass through to canvas */
        }

        /* re-enable pointer events only on interactive children */
        header > *, header button { pointer-events: auto; }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 1rem;
            letter-spacing: -0.3px;
            background: linear-gradient(45deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .subtitle { display: none; }

        /* Stats moved to bottom-right pill */
        .stats { display: none; }

        .mission { display: none; }

        /* Wallet connect button */
        #btn-connect-header {
            padding: 0.35rem 0.8rem;
            background: rgba(0, 255, 204, 0.08);
            border: 1px solid rgba(0, 255, 204, 0.4);
            border-radius: 6px;
            color: var(--accent-color);
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        #btn-connect-header:hover { background: rgba(0, 255, 204, 0.18); }
        #btn-connect-header.connected {
            background: rgba(0, 255, 204, 0.05);
            border-color: rgba(0, 255, 204, 0.3);
        }

        /* ── Stats pill — bottom right overlay ─────────────────────────────── */
        #stats-overlay {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 200;
            display: flex;
            gap: 0.6rem;
            background: rgba(10, 10, 12, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 0.4rem 0.75rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            pointer-events: none;
        }
        #stats-overlay span b { color: var(--accent-color); }

        /* ── Canvas — fills entire viewport via scale ──────────────────────── */
        #canvas-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #canvas-container {
            position: relative;
            width: 1000px;
            height: 1000px;
            background-color: #000;
            cursor: crosshair;
            overflow: hidden;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 10px 10px;
            user-select: none;
            -webkit-user-select: none;
            transform-origin: center center;
        }

        .pixel-block {
            position: absolute;
            box-sizing: border-box;
            z-index: 2;
        }

        /* Hover block highlight */
        #hover-highlight {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--hover-color);
            box-shadow: 0 0 8px var(--accent-color);
            pointer-events: none;
            z-index: 5;
            display: none;
            border-radius: 1px;
        }

        /* Rubber-band selection rectangle */
        #selection-rect {
            position: absolute;
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 14px rgba(0, 255, 204, 0.35), inset 0 0 30px rgba(0, 255, 204, 0.04);
            pointer-events: none;
            z-index: 6;
            display: none;
        }

        /* Committed multi-select overlays (same style as active drag rect) */
        .committed-selection {
            position: absolute;
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 14px rgba(0, 255, 204, 0.35), inset 0 0 30px rgba(0, 255, 204, 0.04);
            pointer-events: none;
            z-index: 6;
        }

        /* "+" cursor when Shift is held */
        #canvas-container.shift-mode { cursor: cell; }

        /* ── Tooltip ────────────────────────────────────────────────────────── */
        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.92);
            border: 1px solid var(--accent-color);
            padding: 10px 12px;
            pointer-events: none;
            display: none;
            z-index: 300;
            font-size: 0.8rem;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.6;
        }

        /* ── Floating buy panel ─────────────────────────────────────────────── */
        #floating-panel {
            position: fixed;
            z-index: 150;
            width: 340px;
            background: rgba(10, 10, 14, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 14px;
            padding: 1.2rem 1.4rem 1.1rem;
            box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,255,204,0.08);
            display: none;
        }

        #floating-panel.visible {
            display: block;
            animation: panel-in 0.18s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes panel-in {
            from { opacity: 0; transform: translateY(8px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.85rem;
        }

        .panel-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 0.2px;
        }

        .panel-subtitle {
            font-size: 0.72rem;
            color: #666;
            margin-top: 0.2rem;
        }

        .panel-close {
            background: none;
            border: none;
            color: #555;
            font-size: 1rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            margin-top: 2px;
            transition: color 0.15s;
        }
        .panel-close:hover { color: #bbb; }

        .panel-price-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.9rem;
            padding-bottom: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .panel-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent-color);
        }

        .panel-price-label {
            font-size: 0.75rem;
            color: #555;
        }

        .panel-inputs {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 0.85rem;
        }

        #floating-panel input[type="url"],
        #floating-panel input[type="text"] {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ddd;
            padding: 0.5rem 0.75rem;
            font-size: 0.83rem;
            width: 100%;
            transition: border-color 0.15s, background 0.15s;
        }
        #floating-panel input::placeholder { color: #444; }
        #floating-panel input:focus {
            outline: none;
            border-color: rgba(0, 255, 204, 0.45);
            background: rgba(0, 255, 204, 0.03);
        }

        .panel-wallet {
            font-size: 0.73rem;
            color: #666;
            margin-bottom: 0.7rem;
        }
        .panel-wallet .addr {
            color: var(--accent-color);
            opacity: 0.85;
        }

        .btn-buy-panel {
            width: 100%;
            padding: 0.65rem;
            background: var(--accent-color);
            border: none;
            border-radius: 9px;
            color: #0a0a0c;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-buy-panel:hover:not(:disabled) { opacity: 0.88; }
        .btn-buy-panel:active:not(:disabled) { transform: scale(0.98); }
        .btn-buy-panel:disabled { opacity: 0.35; cursor: not-allowed; }

        .btn-connect-panel {
            width: 100%;
            padding: 0.65rem;
            background: rgba(0, 255, 204, 0.07);
            border: 1px solid rgba(0, 255, 204, 0.4);
            border-radius: 9px;
            color: var(--accent-color);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-connect-panel:hover { background: rgba(0, 255, 204, 0.14); }

        #panel-status {
            font-size: 0.76rem;
            margin-top: 0.65rem;
            min-height: 1em;
            line-height: 1.5;
            color: transparent;
            transition: color 0.2s;
            word-break: break-word;
        }
        #panel-status:not(:empty) { color: #888; }
        #panel-status.ok   { color: var(--accent-color) !important; }
        #panel-status.err  { color: #ff6464 !important; }
        #panel-status.info { color: #999 !important; }

        /* ── Mobile responsive ──────────────────────────────────────────────── */
        @media (max-width: 600px) {
            header { padding: 0.5rem 0.75rem; }
            h1 { font-size: 0.85rem; }
            #btn-connect-header { font-size: 0.68rem; padding: 0.3rem 0.65rem; }

            #stats-overlay {
                bottom: 0.5rem;
                right: 0.5rem;
                font-size: 0.62rem;
                padding: 0.3rem 0.55rem;
                gap: 0.4rem;
            }

            /* Panel anchors to bottom on mobile — JS positioning disabled via isMobileView() */
            #floating-panel.mobile-anchored {
                position: fixed !important;
                width: calc(100vw - 1.5rem) !important;
                left: 0.75rem !important;
                right: 0.75rem !important;
                bottom: 4rem !important;
                top: auto !important;
                border-radius: 16px;
                max-height: 70vh;
                overflow-y: auto;
            }
        }

        /* ── Footer ─────────────────────────────────────────────────────────── */
        footer {
            display: none;
            margin-top: auto;
            padding: 2rem;
            opacity: 0.45;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <h1>Million Pixel Page</h1>
    </div>
    <button id="btn-connect-header" onclick="connectWallet()">Connect Wallet</button>
</header>

<div id="canvas-wrapper">
  <div id="canvas-container">
      <div id="hover-highlight"></div>
      <div id="selection-rect"></div>
  </div>
</div>

<!-- Stats pill — bottom-right overlay -->
<div id="stats-overlay">
    <span>Sold: <b id="stat-sold">0</b></span>
    <span>·</span>
    <span>Available: <b id="stat-available">1M</b></span>
    <span>·</span>
    <span>Revenue: <b id="stat-revenue">0</b> ETH</span>
</div>

<div id="tooltip"></div>

<!-- ── Floating buy panel ─────────────────────────────────────────────────── -->
<div id="floating-panel">
    <div class="panel-header">
        <div>
            <div class="panel-title" id="panel-selection-label">Select pixels on the canvas</div>
            <div class="panel-subtitle">Drag to paint a rectangular region</div>
        </div>
        <button class="panel-close" onclick="clearSelection()" title="Close">✕</button>
    </div>

    <div class="panel-price-row">
        <div class="panel-price" id="panel-price">—</div>
        <div class="panel-price-label" id="panel-price-label">ETH</div>
    </div>

    <div class="panel-inputs">
        <input type="url" id="fp-img"  placeholder="Image URL  (https://…)" autocomplete="off">
        <input type="url" id="fp-link" placeholder="Link URL   (https://…)" autocomplete="off">
    </div>

    <div class="panel-wallet" id="panel-wallet-info">
        Wallet: <span id="panel-wallet-text">not connected</span>
    </div>

    <button class="btn-buy-panel"     id="fp-btn-buy"     onclick="buyPixels()"     style="display:none">Buy Pixels</button>
    <button class="btn-connect-panel" id="fp-btn-connect" onclick="connectWallet()">Connect Wallet</button>

    <div id="panel-status"></div>
</div>

<footer>
    &copy; 2026 The Million Pixel Page — All proceeds fund
    <a href="https://github.com/ethereum/ERCs/blob/master/ERCS/erc-8183.md" style="color:var(--accent-color);text-decoration:underline;">EIP-8183</a>
    development. Built for the Agentic Web.
</footer>

<script>
// ── Contract config ─────────────────────────────────────────────────────────
const CONTRACT_ADDRESS    = '0xe825858103c1b36871bc7b013fe5116f5599d15e';
const BASE_SEPOLIA_CHAIN_ID = '0x14a34'; // 84532
const BASE_SEPOLIA_RPC    = 'https://sepolia.base.org';
const EXPLORER_URL        = 'https://sepolia.basescan.org/address/' + CONTRACT_ADDRESS;

// ── ABI encoding helpers ────────────────────────────────────────────────────
function encodeUint256(n) {
    return BigInt(n).toString(16).padStart(64, '0');
}
function encodeBool(b)   { return b ? '0'.repeat(63) + '1' : '0'.repeat(64); }
function encodeAddress(addr) { return addr.slice(2).toLowerCase().padStart(64, '0'); }
function encodeBytes32(hex)  { return hex.slice(2).padStart(64, '0'); }

function encodeString(str) {
    const bytes = new TextEncoder().encode(str);
    const len   = bytes.length;
    let hex = encodeUint256(len);
    for (const b of bytes) hex += b.toString(16).padStart(2, '0');
    const rem = len % 32;
    if (rem !== 0) hex += '00'.repeat(32 - rem);
    return hex;
}

function encodeFunctionCall(selector, types, values) {
    let staticPart  = '';
    let dynamicPart = '';
    const offsets   = [];
    let dynOffset   = types.length * 32;

    for (let i = 0; i < types.length; i++) {
        if (types[i] === 'string' || types[i] === 'bytes') {
            offsets.push(dynOffset);
            const enc    = encodeString(values[i]);
            dynamicPart += enc;
            dynOffset   += enc.length / 2;
        } else {
            offsets.push(null);
        }
    }

    let dynOff2 = types.length * 32;
    for (let i = 0; i < types.length; i++) {
        if (types[i] === 'string' || types[i] === 'bytes') {
            staticPart += encodeUint256(offsets[i]);
        } else if (types[i] === 'uint256') {
            staticPart += encodeUint256(values[i]);
        } else if (types[i] === 'address') {
            staticPart += encodeAddress(values[i]);
        } else if (types[i] === 'bytes32') {
            staticPart += encodeBytes32(values[i]);
        } else if (types[i] === 'bool') {
            staticPart += encodeBool(values[i]);
        }
    }

    return '0x' + selector + staticPart + dynamicPart;
}

const SELECTORS = {
    createPixelJob: '58cc6d2a',
    setProvider:    '4a7987a2',
    setBudget:      'd1eb5f5e',
    fund:           'e46bbc9e',
    submit:         '91571387',
};

function buildCalldata(fn, types, values) {
    const sel = SELECTORS[fn];
    if (!sel) throw new Error('Unknown function: ' + fn);
    return encodeFunctionCall(sel, types, values);
}

// ── DOM refs ────────────────────────────────────────────────────────────────
const container    = document.getElementById('canvas-container');
const tooltip      = document.getElementById('tooltip');
const statSold     = document.getElementById('stat-sold');
const statAvail    = document.getElementById('stat-available');
const statRev      = document.getElementById('stat-revenue');
const hoverHL      = document.getElementById('hover-highlight');
const selRect      = document.getElementById('selection-rect');
const floatPanel   = document.getElementById('floating-panel');

// ── Wallet state ────────────────────────────────────────────────────────────
let walletAddress = null;

// ── Selection state ─────────────────────────────────────────────────────────
let selections = [];     // array of { x, y, w, h } committed rects (10px-snapped)
let isDragging = false;
let dragOrigin = null;   // { x, y } in canvas-local px
let shiftDrag  = false;  // was Shift held at drag start?

// ── Helpers ─────────────────────────────────────────────────────────────────
function snapTo10(v) { return Math.floor(v / 10) * 10; }

function canvasPos(e) {
    const rect = container.getBoundingClientRect();
    const scale = rect.width / 1000;
    return {
        x: Math.max(0, Math.min(990, (e.clientX - rect.left) / scale)),
        y: Math.max(0, Math.min(990, (e.clientY - rect.top)  / scale))
    };
}

function calcPrice(blocks) {
    return blocks * 0.05;    // 0.05 ETH per 10×10 block → 500 ETH full sellout ≈ $1M
}

// ── Canvas mouse events ─────────────────────────────────────────────────────
container.addEventListener('mousemove', (e) => {
    const pos = canvasPos(e);

    if (isDragging) {
        hoverHL.style.display = 'none';
        tooltip.style.display = 'none';

        const ox = snapTo10(dragOrigin.x);
        const oy = snapTo10(dragOrigin.y);
        const ex = snapTo10(pos.x);
        const ey = snapTo10(pos.y);

        const rx = Math.min(ox, ex);
        const ry = Math.min(oy, ey);
        const rw = Math.abs(ex - ox) + 10;
        const rh = Math.abs(ey - oy) + 10;

        selRect.style.display = 'block';
        selRect.style.left    = rx + 'px';
        selRect.style.top     = ry + 'px';
        selRect.style.width   = rw + 'px';
        selRect.style.height  = rh + 'px';
    } else {
        // hover highlight
        hoverHL.style.display = 'block';
        hoverHL.style.left    = snapTo10(pos.x) + 'px';
        hoverHL.style.top     = snapTo10(pos.y) + 'px';
    }
});

container.addEventListener('mouseleave', () => {
    hoverHL.style.display = 'none';
    if (!isDragging) tooltip.style.display = 'none';
});

container.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    const pos = canvasPos(e);

    // If clicking on a pixel-block (owned pixel), let the hover tooltip show
    // and don't start a drag (the element event will handle it)
    if (e.target.classList.contains('pixel-block')) return;

    isDragging = true;
    dragOrigin = pos;
    shiftDrag  = e.shiftKey;

    if (!shiftDrag) {
        // Normal drag: clear existing selections
        selections = [];
        renderSelections();
        floatPanel.classList.remove('visible');
        floatPanel.style.display = 'none';
    }

    selRect.style.display = 'none';
    hoverHL.style.display = 'none';
    e.preventDefault();
});

document.addEventListener('mouseup', (e) => {
    if (!isDragging) return;
    isDragging = false;

    if (selRect.style.display !== 'none') {
        const rx = parseInt(selRect.style.left)   || 0;
        const ry = parseInt(selRect.style.top)    || 0;
        const rw = parseInt(selRect.style.width)  || 0;
        const rh = parseInt(selRect.style.height) || 0;

        selRect.style.display = 'none';

        if (rw >= 10 && rh >= 10) {
            selections.push({ x: rx, y: ry, w: rw, h: rh });
            renderSelections();
            showFloatingPanel();
        } else if (!shiftDrag) {
            clearSelection();
        }
    } else if (!shiftDrag) {
        clearSelection();
    }
});

function clearSelection() {
    selections = [];
    renderSelections();
    selRect.style.display = 'none';
    floatPanel.classList.remove('visible');
    floatPanel.style.display = 'none';
    clearStatus();
}

// ── Touch events (mobile drag-select) ───────────────────────────────────────
function touchPos(e) {
    const t = e.touches[0] || e.changedTouches[0];
    const rect = container.getBoundingClientRect();
    const scale = rect.width / 1000;
    return {
        x: Math.max(0, Math.min(990, (t.clientX - rect.left) / scale)),
        y: Math.max(0, Math.min(990, (t.clientY - rect.top)  / scale))
    };
}

container.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    e.preventDefault();
    const pos = touchPos(e);
    if (e.target.classList.contains('pixel-block')) return;
    isDragging = true;
    dragOrigin = pos;
    shiftDrag  = false;
    selections = [];
    renderSelections();
    floatPanel.classList.remove('visible');
    floatPanel.style.display = 'none';
    selRect.style.display = 'none';
    hoverHL.style.display  = 'none';
}, { passive: false });

container.addEventListener('touchmove', (e) => {
    if (!isDragging || e.touches.length !== 1) return;
    e.preventDefault();
    const pos = touchPos(e);
    const ox = snapTo10(dragOrigin.x);
    const oy = snapTo10(dragOrigin.y);
    const cx = snapTo10(pos.x);
    const cy = snapTo10(pos.y);
    const x = Math.min(ox, cx);
    const y = Math.min(oy, cy);
    const w = Math.max(10, Math.abs(cx - ox));
    const h = Math.max(10, Math.abs(cy - oy));
    selRect.style.left    = x + 'px';
    selRect.style.top     = y + 'px';
    selRect.style.width   = w + 'px';
    selRect.style.height  = h + 'px';
    selRect.style.display = 'block';
}, { passive: false });

container.addEventListener('touchend', (e) => {
    if (!isDragging) return;
    isDragging = false;
    e.preventDefault();
    if (selRect.style.display !== 'none') {
        const rx = parseInt(selRect.style.left)   || 0;
        const ry = parseInt(selRect.style.top)    || 0;
        const rw = parseInt(selRect.style.width)  || 0;
        const rh = parseInt(selRect.style.height) || 0;
        selRect.style.display = 'none';
        if (rw >= 10 && rh >= 10) {
            selections.push({ x: rx, y: ry, w: rw, h: rh });
            renderSelections();
            showFloatingPanel();
        }
    }
}, { passive: false });

function renderSelections() {
    // Remove stale committed-selection overlays
    document.querySelectorAll('.committed-selection').forEach(el => el.remove());
    for (const sel of selections) {
        const div = document.createElement('div');
        div.className    = 'committed-selection';
        div.style.left   = sel.x + 'px';
        div.style.top    = sel.y + 'px';
        div.style.width  = sel.w + 'px';
        div.style.height = sel.h + 'px';
        container.appendChild(div);
    }
}

function showFloatingPanel() {
    if (selections.length === 0) return;

    let totalBlocks = 0;
    for (const sel of selections) {
        totalBlocks += (sel.w / 10) * (sel.h / 10);
    }
    const totalPx = totalBlocks * 100; // each block = 10×10 = 100 pixels (display as raw pixels)
    const price   = calcPrice(totalBlocks);

    let label;
    if (selections.length === 1) {
        const { w, h } = selections[0];
        label = `${w}×${h} px — ${totalBlocks.toLocaleString()} block${totalBlocks !== 1 ? 's' : ''} — ${price.toFixed(4)} ETH`;
    } else {
        label = `${selections.length} selections — ${totalBlocks.toLocaleString()} blocks — ${price.toFixed(4)} ETH`;
    }
    document.getElementById('panel-selection-label').textContent = label;
    document.getElementById('panel-price').textContent = price.toFixed(4);
    document.getElementById('panel-price-label').textContent = 'ETH';

    positionPanel();
    floatPanel.classList.remove('visible');
    floatPanel.style.display = 'block';
    // trigger reflow for animation
    floatPanel.offsetHeight;
    floatPanel.classList.add('visible');
}

function isMobileView() { return window.innerWidth <= 600; }

function positionPanel() {
    if (isMobileView()) {
        // On mobile: bottom-anchored sheet, no JS positioning
        floatPanel.classList.add('mobile-anchored');
        floatPanel.style.left   = '';
        floatPanel.style.top    = '';
        floatPanel.style.bottom = '';
        return;
    }
    floatPanel.classList.remove('mobile-anchored');

    const ref        = selections[selections.length - 1];
    const canvasRect = container.getBoundingClientRect();
    const scale      = canvasRect.width / 1000;
    const panelW     = 340;
    const panelH     = 320;

    // Selection rect in viewport coords
    const selLeft = canvasRect.left + ref.x * scale;
    const selTop  = canvasRect.top  + ref.y * scale;
    const selRight = selLeft + ref.w * scale;

    // Try right of selection first
    let left = selRight + 14;
    let top  = selTop;

    // Overflow right → try left
    if (left + panelW > window.innerWidth - 10) {
        left = selLeft - panelW - 14;
    }
    // Still off-screen → center
    if (left < 10) {
        left = Math.max(10, (window.innerWidth - panelW) / 2);
    }
    // Clamp vertically
    if (top + panelH > window.innerHeight - 10) {
        top = window.innerHeight - panelH - 10;
    }
    if (top < 10) top = 10;

    floatPanel.style.left = left + 'px';
    floatPanel.style.top  = top  + 'px';
}

// ── Wallet connection ───────────────────────────────────────────────────────
function isMobile() {
    return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
}

function openInMetaMask() {
    const url = window.location.href.replace(/^https?:\/\//, '');
    window.location.href = 'https://metamask.app.link/dapp/' + url;
}

async function connectWallet() {
    if (!window.ethereum) {
        if (isMobile()) {
            // On mobile without injected provider — offer to open inside MetaMask app
            const panel = document.getElementById('panel-status');
            setStatus('', 'info');
            // Show a styled button in the panel status area
            panel.innerHTML = `
                <div style="margin-top:0.5rem">
                    <div style="color:#aaa;margin-bottom:0.6rem;font-size:0.78rem;">
                        No wallet detected. Open this page inside MetaMask's browser:
                    </div>
                    <button onclick="openInMetaMask()" style="
                        width:100%;padding:0.6rem;background:var(--accent-color);
                        border:none;border-radius:9px;color:#0a0a0c;font-size:0.88rem;
                        font-weight:700;cursor:pointer;letter-spacing:0.2px;">
                        🦊 Open in MetaMask
                    </button>
                    <div style="color:#555;margin-top:0.5rem;font-size:0.7rem;text-align:center;">
                        or use a desktop browser with MetaMask installed
                    </div>
                </div>`;
            panel.style.color = '#aaa';
        } else {
            setStatus('MetaMask not detected — <a href="https://metamask.io/download/" target="_blank" style="color:var(--accent-color)">install it here</a>.', 'err');
            document.getElementById('panel-status').innerHTML = `
                No MetaMask detected. 
                <a href="https://metamask.io/download/" target="_blank" style="color:var(--accent-color);text-decoration:underline">
                Install MetaMask →</a>`;
        }
        return;
    }
    try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        walletAddress  = accounts[0];

        // Switch to Base Sepolia
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: BASE_SEPOLIA_CHAIN_ID }],
            });
        } catch (switchErr) {
            if (switchErr.code === 4902) {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: BASE_SEPOLIA_CHAIN_ID,
                        chainName: 'Base Sepolia',
                        nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                        rpcUrls: [BASE_SEPOLIA_RPC],
                        blockExplorerUrls: ['https://sepolia.basescan.org'],
                    }],
                });
            }
        }

        updateWalletUI();
        setStatus('Wallet connected. Select pixels to buy.', 'info');
    } catch (err) {
        setStatus('Connection failed: ' + err.message, 'err');
    }
}

function updateWalletUI() {
    if (!walletAddress) return;
    const short = walletAddress.slice(0, 6) + '…' + walletAddress.slice(-4);

    // Header button
    const headerBtn = document.getElementById('btn-connect-header');
    headerBtn.textContent = short;
    headerBtn.classList.add('connected');

    // Panel
    document.getElementById('panel-wallet-text').innerHTML =
        `<span class="addr">${short}</span>`;
    document.getElementById('fp-btn-buy').style.display     = 'block';
    document.getElementById('fp-btn-connect').style.display = 'none';
}

// ── Buy Pixels ──────────────────────────────────────────────────────────────
async function buyPixels() {
    if (!walletAddress) { setStatus('Connect your wallet first.', 'err'); return; }
    if (!selection)     { setStatus('Select pixels on the canvas first.', 'err'); return; }

    const x        = selection.x;
    const y        = selection.y;
    const w        = selection.w;
    const h        = selection.h;
    const imgUrl   = document.getElementById('fp-img').value.trim();
    const linkUrl  = document.getElementById('fp-link').value.trim();

    if (!imgUrl)   { setStatus('Please enter an Image URL.', 'err'); return; }
    if (!linkUrl)  { setStatus('Please enter a Link URL.', 'err'); return; }

    const blocks     = (w / 10) * (h / 10);
    const budgetEth  = calcPrice(blocks);
    const budgetWei  = BigInt(Math.floor(budgetEth * 1e18));
    const expiredAt  = Math.floor(Date.now() / 1000) + 30 * 24 * 3600; // 30 days

    const RELAY_PROVIDER = '0x7b9797c4c2DA625b120A27AD2c07bECB7A0E30fa';

    document.getElementById('fp-btn-buy').disabled = true;
    setStatus('Step 1/4: Creating pixel job…', 'info');

    try {
        // 1. createPixelJob
        const createData = buildCalldata('createPixelJob',
            ['uint256','uint256','uint256','uint256','uint256','string','string','address'],
            [expiredAt, x, y, w, h, imgUrl, linkUrl, '0x0000000000000000000000000000000000000000']
        );
        const createTx = await window.ethereum.request({
            method: 'eth_sendTransaction',
            params: [{ from: walletAddress, to: CONTRACT_ADDRESS, data: createData, gas: '0x7a120' }],
        });
        setStatus(`Step 1/4: Waiting for confirmation…`, 'info');
        const jobId = await waitAndGetJobId(createTx);
        if (!jobId) throw new Error('Could not get jobId from receipt');
        setStatus('Step 2/4: Setting provider…', 'info');

        // 2. setProvider
        const spData = buildCalldata('setProvider', ['bytes32','address'], [jobId, RELAY_PROVIDER]);
        const spTx   = await window.ethereum.request({
            method: 'eth_sendTransaction',
            params: [{ from: walletAddress, to: CONTRACT_ADDRESS, data: spData, gas: '0x30d40' }],
        });
        await waitTx(spTx);
        setStatus('Step 3/4: Setting budget…', 'info');

        // 3. setBudget
        const sbData = buildCalldata('setBudget', ['bytes32','uint256'], [jobId, budgetWei.toString()]);
        const sbTx   = await window.ethereum.request({
            method: 'eth_sendTransaction',
            params: [{ from: walletAddress, to: CONTRACT_ADDRESS, data: sbData, gas: '0x30d40' }],
        });
        await waitTx(sbTx);
        setStatus(`Step 4/4: Funding with ${budgetEth.toFixed(5)} ETH…`, 'info');

        // 4. fund
        const fData = buildCalldata('fund', ['bytes32','uint256'], [jobId, budgetWei.toString()]);
        const fTx   = await window.ethereum.request({
            method: 'eth_sendTransaction',
            params: [{
                from: walletAddress, to: CONTRACT_ADDRESS, data: fData,
                value: '0x' + budgetWei.toString(16),
                gas: '0x30d40',
            }],
        });
        await waitTx(fTx);

        setStatus(
            `✅ Done! Job ${jobId.slice(0,10)}… — GenLayer AI will verify and place your pixel.`,
            'ok'
        );
        loadRevenue();
    } catch (err) {
        setStatus('Error: ' + err.message, 'err');
    } finally {
        document.getElementById('fp-btn-buy').disabled = false;
    }
}

// ── Status helpers ──────────────────────────────────────────────────────────
function setStatus(msg, cls) {
    const el = document.getElementById('panel-status');
    el.textContent = msg;
    el.className   = cls;
}

function clearStatus() {
    const el = document.getElementById('panel-status');
    el.textContent = '';
    el.className   = '';
}

// ── TX helpers ──────────────────────────────────────────────────────────────
async function waitTx(hash) {
    for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 2000));
        const res = await window.ethereum.request({
            method: 'eth_getTransactionReceipt', params: [hash]
        });
        if (res) return res;
    }
    throw new Error('Transaction not mined in time');
}

async function waitAndGetJobId(createTxHash) {
    const receipt = await waitTx(createTxHash);
    if (!receipt || !receipt.logs) return null;
    for (const log of receipt.logs) {
        if (log.address.toLowerCase() === CONTRACT_ADDRESS.toLowerCase() && log.topics[1]) {
            return log.topics[1];
        }
    }
    return null;
}

// ── Load revenue ────────────────────────────────────────────────────────────
async function loadRevenue() {
    try {
        const res = await fetch(BASE_SEPOLIA_RPC, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                jsonrpc: '2.0', id: 1, method: 'eth_getBalance',
                params: [CONTRACT_ADDRESS, 'latest']
            })
        });
        const data = await res.json();
        if (data.result) {
            const eth = Number(BigInt(data.result)) / 1e18;
            statRev.innerText = eth.toFixed(6);
        }
    } catch {}
}

// ── Load pixels ─────────────────────────────────────────────────────────────
async function loadPixels() {
    try {
        const response = await fetch('pixels.json');
        const pixels   = await response.json();
        let totalPixelsSold = 0;

        pixels.forEach(p => {
            const block = document.createElement('a');
            block.href      = p.linkUrl;
            block.target    = '_blank';
            block.className = 'pixel-block';
            block.style.left   = p.x + 'px';
            block.style.top    = p.y + 'px';
            block.style.width  = p.width + 'px';
            block.style.height = p.height + 'px';
            block.style.backgroundImage = `url(${p.imageUrl})`;
            block.style.backgroundSize  = 'cover';
            totalPixelsSold += (p.width * p.height);

            block.addEventListener('mouseover', (e) => {
                e.stopPropagation();
                hoverHL.style.display = 'none';
                tooltip.style.display = 'block';
                tooltip.innerHTML = `
                    <strong>Owner:</strong> ${p.owner}<br>
                    <strong>Job ID:</strong> ${p.jobId}<br>
                    <strong>Size:</strong> ${p.width}×${p.height}px
                `;
            });
            block.addEventListener('mousemove', (e) => {
                tooltip.style.left = (e.clientX + 16) + 'px';
                tooltip.style.top  = (e.clientY + 16) + 'px';
            });
            block.addEventListener('mouseout', () => {
                tooltip.style.display = 'none';
            });
            container.appendChild(block);
        });

        statSold.innerText  = totalPixelsSold.toLocaleString();
        statAvail.innerText = (1000000 - totalPixelsSold).toLocaleString();
    } catch (err) {
        console.error('Failed to load pixels.json', err);
    }
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadPixels();
loadRevenue();

// ── Scale canvas to fill viewport ───────────────────────────────────────────
function scaleCanvas() {
    // On mobile: fill the full viewport width so the grid is usable.
    // On desktop: fit the entire grid without scrolling.
    let scale;
    if (window.innerWidth <= 600) {
        // Portrait mobile: fill width, allow vertical scroll inside wrapper
        scale = window.innerWidth / 1000;
    } else {
        scale = Math.min(window.innerWidth / 1000, window.innerHeight / 1000);
    }
    container.style.transform = `scale(${scale})`;

    // Update canvas-wrapper height on mobile so the scaled canvas doesn't clip
    if (window.innerWidth <= 600) {
        document.getElementById('canvas-wrapper').style.height = (1000 * scale) + 'px';
        document.getElementById('canvas-wrapper').style.overflow = 'visible';
    } else {
        document.getElementById('canvas-wrapper').style.height = '100vh';
        document.getElementById('canvas-wrapper').style.overflow = 'hidden';
    }
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);
</script>
